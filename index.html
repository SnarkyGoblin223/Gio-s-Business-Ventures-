<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gio — Ventures</title>
  <meta name="description" content="Hi, I'm Gio. Here's some current ventures I have." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ============ INTRO ============ -->
  <section class="layer intro" id="intro">
    <div class="intro-bg">
      <span class="orb orb-1"></span>
      <span class="orb orb-2"></span>
      <span class="orb orb-3"></span>
    </div>
    <div class="intro-inner">
      <h1 class="intro-hi">Hi, I'm <span class="grad">Gio</span></h1>
      <p class="intro-mid">I like to do things.</p>
      <p class="intro-sub">Here's some current ventures I have.</p>
      <button class="explore-btn" id="exploreBtn">
        <span class="explore-label">Explore</span>
        <span class="explore-icon" aria-hidden="true">▸</span>
      </button>
    </div>
  </section>

  <!-- ============ TETRIS LINE-CLEAR TRANSITION (built by JS) ============ -->
  <div class="tetris" id="tetris" aria-hidden="true">
    <div class="tetris-bg"></div>
    <div class="tetris-stage">
      <div class="tetris-board" id="tetrisBoard"></div>
      <div class="tetris-word" id="tetrisWord">TETRIS</div>
    </div>
    <div class="tetris-flash" id="tetrisFlash"></div>
  </div>

  <!-- ============ VENTURES (tarot grid) ============ -->
  <section class="layer ventures" id="ventures" aria-hidden="true">
    <header class="ventures-head">
      <h2>The Ventures</h2>
      <p>Six paths. Choose a card.</p>
    </header>

    <div class="card-grid">
      <!-- CARD 1 -->
      <button class="tcard" data-venture="1">
        <div class="tcard-inner">
          <div class="tcard-face tcard-front">
            <div class="tcard-frame">
              <span class="tcard-numeral">I</span>
              <span class="tcard-emblem">♟</span>
              <h3 class="tcard-title">Venture One</h3>
              <p class="tcard-tag">A short tagline</p>
              <span class="tcard-star">✦</span>
            </div>
          </div>
          <div class="tcard-face tcard-back">
            <p class="tcard-back-text">Details coming soon.</p>
            <span class="tcard-back-hint">Tap to flip back</span>
          </div>
        </div>
      </button>

      <!-- CARD 2 -->
      <button class="tcard" data-venture="2">
        <div class="tcard-inner">
          <div class="tcard-face tcard-front">
            <div class="tcard-frame">
              <span class="tcard-numeral">II</span>
              <span class="tcard-emblem">✺</span>
              <h3 class="tcard-title">Venture Two</h3>
              <p class="tcard-tag">A short tagline</p>
              <span class="tcard-star">✦</span>
            </div>
          </div>
          <div class="tcard-face tcard-back">
            <p class="tcard-back-text">Details coming soon.</p>
            <span class="tcard-back-hint">Tap to flip back</span>
          </div>
        </div>
      </button>

      <!-- CARD 3 -->
      <button class="tcard" data-venture="3">
        <div class="tcard-inner">
          <div class="tcard-face tcard-front">
            <div class="tcard-frame">
              <span class="tcard-numeral">III</span>
              <span class="tcard-emblem">☼</span>
              <h3 class="tcard-title">Venture Three</h3>
              <p class="tcard-tag">A short tagline</p>
              <span class="tcard-star">✦</span>
            </div>
          </div>
          <div class="tcard-face tcard-back">
            <p class="tcard-back-text">Details coming soon.</p>
            <span class="tcard-back-hint">Tap to flip back</span>
          </div>
        </div>
      </button>

      <!-- CARD 4 -->
      <button class="tcard" data-venture="4">
        <div class="tcard-inner">
          <div class="tcard-face tcard-front">
            <div class="tcard-frame">
              <span class="tcard-numeral">IV</span>
              <span class="tcard-emblem">❖</span>
              <h3 class="tcard-title">Venture Four</h3>
              <p class="tcard-tag">A short tagline</p>
              <span class="tcard-star">✦</span>
            </div>
          </div>
          <div class="tcard-face tcard-back">
            <p class="tcard-back-text">Details coming soon.</p>
            <span class="tcard-back-hint">Tap to flip back</span>
          </div>
        </div>
      </button>

      <!-- CARD 5 — locked -->
      <button class="tcard locked" data-venture="5" aria-disabled="true">
        <div class="tcard-inner">
          <div class="tcard-face tcard-front">
            <div class="tcard-frame tcard-frame-locked">
              <span class="tcard-lock">?</span>
              <p class="tcard-coming">Coming Soon</p>
            </div>
          </div>
        </div>
      </button>

      <!-- CARD 6 — locked -->
      <button class="tcard locked" data-venture="6" aria-disabled="true">
        <div class="tcard-inner">
          <div class="tcard-face tcard-front">
            <div class="tcard-frame tcard-frame-locked">
              <span class="tcard-lock">?</span>
              <p class="tcard-coming">Coming Soon</p>
            </div>
          </div>
        </div>
      </button>
    </div>

    <button class="back-btn" id="backBtn">↺ Back to start</button>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
